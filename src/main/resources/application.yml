# JWT配置
jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-time: ${JWT_EXPIRATION_TIME:86400000}

spring:
  application:
    name: DB_document

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/homework
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  # 注意：servlet 要和 datasource 平级，都在 spring 下面
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis:
  type-aliases-package: com.example.db_document.pojo            #起别名
  mapper-locations: classpath:mapper/*.xml               #mapper映射文件路径
  configuration:
    # 开启驼峰命名映射
    map-underscore-to-camel-case: true

# 自定义配置（顶格写，作为一级配置）
file:
  # 建议：Windows路径也统一用正斜杠 /，Java能自动识别，且避免转义问题
  upload-dir: ${FILE_UPLOAD_DIR:./Uploads/}
  # 允许的文件类型（MIME类型）
  allowed-types: image/jpeg,image/png,image/gif,image/webp
  # 最大文件大小（字节）
  max-size: 5242880 # 5MB
  # 是否启用病毒扫描
  virus-scan-enabled: false
  # 上传速率限制（每分钟）
  rate-limit: 10

doc-update:
  flush-interval-ms: 500
  max-batch-size: 10
