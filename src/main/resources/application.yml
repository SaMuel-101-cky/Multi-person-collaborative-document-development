# JWT配置
jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-time: ${JWT_EXPIRATION_TIME:86400000}

spring:
  application:
    name: DB_document

  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/homework
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}

  # 注意：servlet 要和 datasource 平级，都在 spring 下面
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis:
  type-aliases-package: com.example.db_document.pojo
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰命名映射
    map-underscore-to-camel-case: true

# 自定义配置（顶格写，作为一级配置）
file:
  # 建议：Windows路径也统一用正斜杠 /，Java能自动识别，且避免转义问题
  upload-dir: ${FILE_UPLOAD_DIR:./Uploads/}